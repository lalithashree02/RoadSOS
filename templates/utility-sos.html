<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoadSOS — Rapid Panels Utility</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:        #e24b4a;
    --red-dark:   #b83232;
    --bg:         #f4f6f9;         /* Matte Slate Light Gray */
    --card:       #ffffff;         /* Pure white clean item cards */
    --border:     rgba(0, 0, 0, 0.06);
    --text:       #1e2530;         /* Deep charcoal readability tone */
    --muted:      #626c7f;         /* Cool accent slate */
  }
  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    padding: 1.5rem;
    max-width: 500px;
    margin: 0 auto;
  }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; text-transform: uppercase; color: var(--text); text-decoration: none;}
  .logo span { color: #ff5c2b; }
  
  .sos-container { text-align: center; margin-bottom: 2.5rem; margin-top: 1rem; }
  .sos-btn {
    width: 190px; height: 190px; border-radius: 50%; background: var(--red);
    border: 10px solid rgba(226, 75, 74, 0.15); color: white; font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem; font-weight: 700; text-transform: uppercase; cursor: pointer;
    box-shadow: 0 8px 30px rgba(226, 75, 74, 0.3); transition: all 0.15s ease; display: inline-flex; align-items: center; justify-content: center;
  }
  .sos-btn:active { transform: scale(0.96); background: var(--red-dark); box-shadow: 0 4px 15px rgba(226, 75, 74, 0.2); }
  
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); padding: 1.2rem; border-radius: 12px; display: flex; flex-direction: column; gap: 0.4rem; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
  .card h3 { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; color: #11161f; }
  .card-num { font-size: 1.7rem; font-weight: 700; color: var(--red); font-family: 'Barlow Condensed', sans-serif; margin: 0.2rem 0; }
  .card-btn { background: var(--bg); text-align: center; padding: 0.5rem; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border); transition: background 0.15s; }
  .card-btn:hover { background: #eef2f7; color: #ff5c2b; }

  #overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.98);
    z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }
  #overlay.visible { opacity: 1; pointer-events: auto; }
  .cd-circle { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--red); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; margin-bottom: 2rem; color: var(--text); }
  .cancel-btn { background: #1e2530; color: #fff; padding: 0.9rem 3rem; border-radius: 30px; font-weight: 600; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

  #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e2530; color: #fff; padding: 0.8rem 1.8rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; z-index: 6000; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
</style>
</head>
<body>

  <header>
    <a href="/" class="logo">Road<span>SOS</span></a>
    <a href="/app" style="color:var(--muted); font-size: 0.9rem; text-decoration: none; font-weight: 500;"><i class="ti ti-map"></i> View Map Dashboard</a>
  </header>

  <div class="sos-container">
    <button class="sos-btn" onclick="startEmergencyCountdown()">Trigger<br/>SOS</button>
    <p style="color:var(--muted); font-size: 0.85rem; margin-top: 1.2rem; font-weight: 500;">Pressing activates local grid emergency alerts</p>
  </div>

  <h2 style="font-family:'Barlow Condensed', sans-serif; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; color:#11161f;">National Lifelines (India)</h2>
  
  <div class="grid">
    <div class="card">
      <h3><i class="ti ti-shield" style="color:#5c6bc0"></i> Police Help</h3>
      <div class="card-num">112 / 100</div>
      <a href="tel:112" class="card-btn">Place Call</a>
    </div>
    <div class="card">
      <h3><i class="ti ti-heart-beat" style="color:#ec407a"></i> Ambulance</h3>
      <div class="card-num">108</div>
      <a href="tel:108" class="card-btn">Place Call</a>
    </div>
    <div class="card">
      <h3><i class="ti ti-truck" style="color:#fb8c00"></i> Highway Acc.</h3>
      <div class="card-num">1033</div>
      <a href="tel:1033" class="card-btn">Place Call</a>
    </div>
    <div class="card">
      <h3><i class="ti ti-flame" style="color:#e53935"></i> Fire Brigade</h3>
      <div class="card-num">101</div>
      <a href="tel:101" class="card-btn">Place Call</a>
    </div>
  </div>

  <div id="overlay">
    <div style="color:var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; font-weight:600;">Broadcasting Emergency Signals In</div>
    <div class="cd-circle" id="cd-num">3</div>
    <button class="cancel-btn" onclick="abortSOSSequence()">Abort SOS</button>
  </div>

  <div id="toast">Message Logged</div>

  <script>
    let timerId = null;
    let count = 3;

    function showToastNotification(text) {
      const t = document.getElementById("toast");
      t.textContent = text;
      t.style.display = "block";
      setTimeout(() => { t.style.display = "none"; }, 3000);
    }

    function startEmergencyCountdown() {
      count = 3;
      document.getElementById("cd-num").textContent = count;
      document.getElementById("overlay").classWithStyle = "visible";
      document.getElementById("overlay").classList.add("visible");
      
      timerId = setInterval(() => {
        count--;
        document.getElementById("cd-num").textContent = count;
        if(count <= 0) {
          clearInterval(timerId);
          document.getElementById("overlay").classList.remove("visible");
          dispatchSOSPayload();
        }
      }, 1000);
    }

    function abortSOSSequence() {
      clearInterval(timerId);
      document.getElementById("overlay").classList.remove("visible");
      showToastNotification("Emergency broadcast sequence canceled.");
    }

    function dispatchSOSPayload() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          executePOST({
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            message: "Rapid Standalone Panel manual deployment sequence triggered."
          });
        }, () => {
          executePOST({ lat: 0.0, lon: 0.0, message: "Telemetry coordinate tracking blocked by client device." });
        });
      } else {
        executePOST({ lat: 0.0, lon: 0.0, message: "GPS browser locator module offline." });
      }
    }

    async function executePOST(payload) {
      try {
        const res = await fetch('/api/sos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        showToastNotification("🚨 SOS Broadcast Confirmed! Emergency services notified.");
      } catch (err) {
        showToastNotification("Network connection failure over highway data node.");
      }
    }
  </script>
</body>
</html>
